# KAPITAL production stack (VPS + Docker).
#
#   cp .env.example .env   # fill prod secrets (see §13 of the plan)
#   docker compose up -d --build
#   docker compose exec backend alembic upgrade head
#   # obtain TLS certs once (see nginx/README note), then:
#   docker compose exec nginx nginx -s reload
#
# Dev stays Docker-free (SQLite + APScheduler, in-process). This file is prod.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kapital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kapital}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kapital}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persist to disk so cache/queue survive restarts.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: kapital-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      GIT_SHA: ${GIT_SHA:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  celery_worker:
    image: kapital-backend:latest
    restart: unless-stopped
    command: ["celery", "-A", "tasks.celery_app.celery", "worker", "--loglevel=info"]
    env_file: .env
    environment:
      ENVIRONMENT: production
      GIT_SHA: ${GIT_SHA:-}
    depends_on:
      - backend
      - redis

  celery_beat:
    image: kapital-backend:latest
    restart: unless-stopped
    command: ["celery", "-A", "tasks.celery_app.celery", "beat", "--loglevel=info"]
    env_file: .env
    environment:
      ENVIRONMENT: production
      GIT_SHA: ${GIT_SHA:-}
    depends_on:
      - celery_worker

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_GIT_SHA: ${GIT_SHA:-}
        VITE_PLAUSIBLE_DOMAIN: ${VITE_PLAUSIBLE_DOMAIN:-}
    image: kapital-frontend:latest
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  # Run on demand to obtain/renew certs:
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d $DOMAIN
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: ["sh", "-c", "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"]

  # Nightly Postgres dump to ./backups (mounted host dir).
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["sh", "/usr/local/bin/backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  certbot-www:
  certbot-certs:
