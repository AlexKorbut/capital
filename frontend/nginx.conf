# Static SPA server (internal). The edge reverse proxy (nginx service) handles
# TLS and routes /api -> backend; this container only serves the built bundle
# with history-API fallback so client-side routes (/legal/:slug, /verify-email,
# …) resolve to index.html.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets; never cache the HTML shell or SW.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
